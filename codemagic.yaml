workflows:
  csc-smart-toolkit-android:
    name: CSC Smart Toolkit — Android Release
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17

    scripts:
      - name: Install JS dependencies
        script: |
          cd $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile
          npm install --legacy-peer-deps

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > \
            $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android/local.properties

      - name: Verify signing files
        script: |
          KEY_PROPS="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android/key.properties"
          KEYSTORE="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android/app/release.keystore"
          if [ ! -f "$KEY_PROPS" ]; then echo "ERROR: key.properties missing"; exit 1; fi
          if [ ! -f "$KEYSTORE" ]; then echo "ERROR: release.keystore missing"; exit 1; fi
          echo "Signing files OK"
          cat "$KEY_PROPS"

      - name: Build Release APK
        script: |
          export PATH="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/node_modules/.bin:$PATH"
          cd $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Build Release AAB
        script: |
          export PATH="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/node_modules/.bin:$PATH"
          cd $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

    artifacts:
      - Offline-Smart-Toolkit/artifacts/mobile/android/app/build/outputs/apk/release/*.apk
      - Offline-Smart-Toolkit/artifacts/mobile/android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
