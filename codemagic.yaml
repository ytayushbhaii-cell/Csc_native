workflows:
  csc-smart-toolkit-android:
    name: CSC Smart Toolkit — Android Release
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17

    scripts:
      # ── 1. JS dependencies ────────────────────────────────────────────────
      - name: Install JS dependencies
        script: |
          cd $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile
          npm install --legacy-peer-deps

      # ── 2. Android SDK licences + SDK 35 ─────────────────────────────────
      - name: Accept Android SDK licences
        script: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006" 2>/dev/null || true
          echo "SDK setup done"

      # ── 3. local.properties ───────────────────────────────────────────────
      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > \
            $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android/local.properties

      # ── 4. Verify signing files ───────────────────────────────────────────
      - name: Verify signing files
        script: |
          KEY="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android/key.properties"
          KS="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android/app/release.keystore"
          [ -f "$KEY" ] && echo "key.properties OK" || { echo "MISSING: key.properties"; exit 1; }
          [ -f "$KS"  ] && echo "release.keystore OK" || { echo "MISSING: release.keystore"; exit 1; }

      # ── 5. Release APK ────────────────────────────────────────────────────
      - name: Build Release APK
        script: |
          export PATH="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/node_modules/.bin:$PATH"
          cd $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      # ── 6. Release AAB ────────────────────────────────────────────────────
      - name: Build Release AAB
        script: |
          export PATH="$CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/node_modules/.bin:$PATH"
          cd $CM_BUILD_DIR/Offline-Smart-Toolkit/artifacts/mobile/android
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all

    artifacts:
      - Offline-Smart-Toolkit/artifacts/mobile/android/app/build/outputs/apk/release/*.apk
      - Offline-Smart-Toolkit/artifacts/mobile/android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
