pluginManagement {
    // npm installs to mobile/node_modules — path from android/ is ../node_modules
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

// Dependency substitution so older native modules that reference the plugin
// by Maven coordinate can resolve it via the composite build.
includeBuild("../node_modules/@react-native/gradle-plugin") {
    dependencySubstitution {
        substitute(module("com.facebook.react:react-native-gradle-plugin")).using(project(":"))
    }
}

rootProject.name = 'CSC Smart Toolkit'
include ':app'
