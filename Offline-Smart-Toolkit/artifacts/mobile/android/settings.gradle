pluginManagement {
    // npm installs to mobile/node_modules. In the pnpm workspace, React Native's
    // Gradle plugin is exposed from the workspace virtual-store node_modules.
    def localPlugin = file("../node_modules/@react-native/gradle-plugin")
    def workspacePlugin = file("../../../node_modules/.pnpm/node_modules/@react-native/gradle-plugin")
    def reactNativeGradlePlugin = (localPlugin.exists() ? localPlugin : workspacePlugin).canonicalFile
    includeBuild(reactNativeGradlePlugin.absolutePath)
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'CSC Smart Toolkit'
include ':app'
