apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native configuration.
 * Prefer the npm layout used by Codemagic, with a pnpm workspace fallback.
 */
def mobileNodeModules = file("../../node_modules")
def workspaceNodeModules = file("../../../node_modules/.pnpm/node_modules")
def reactNativeNodeModules = mobileNodeModules.exists() ? mobileNodeModules : workspaceNodeModules
def codegenDir = file("${reactNativeNodeModules}/@react-native/codegen")
if (!codegenDir.exists()) {
    codegenDir = file("${workspaceNodeModules}/@react-native/codegen")
}
def mobileRoot = file("../..")
def reactNativeDir = file("${mobileRoot}/node_modules/react-native")

react {
    entryFile    = file("${mobileRoot}/index.js")
    reactNativeDir = reactNativeDir
    hermesCommand  = "${reactNativeDir}/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir   = codegenDir
}

// ── Release signing from key.properties ──────────────────────────────────────
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    ndkVersion       rootProject.ext.ndkVersion
    compileSdk       rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion

    namespace "com.cscsmarttoolkit.app"

    defaultConfig {
        applicationId   "com.cscsmarttoolkit.app"
        minSdk          rootProject.ext.minSdkVersion
        targetSdk       rootProject.ext.targetSdkVersion
        versionCode     8
        versionName     "8.0.0"
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile    file('debug.keystore')
            storePassword 'android'
            keyAlias     'androiddebugkey'
            keyPassword  'android'
        }
        release {
            storeFile keystorePropertiesFile.exists()
                ? file(keystoreProperties['storeFile'])
                : file(System.getenv("RELEASE_KEYSTORE_PATH") ?: 'debug.keystore')
            storePassword keystorePropertiesFile.exists()
                ? keystoreProperties['storePassword']
                : (System.getenv("RELEASE_KEYSTORE_PASSWORD") ?: 'android')
            keyAlias keystorePropertiesFile.exists()
                ? keystoreProperties['keyAlias']
                : (System.getenv("RELEASE_KEY_ALIAS") ?: 'androiddebugkey')
            keyPassword keystorePropertiesFile.exists()
                ? keystoreProperties['keyPassword']
                : (System.getenv("RELEASE_KEY_PASSWORD") ?: 'android')
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable    true
        }
        release {
            signingConfig    signingConfigs.release
            minifyEnabled    false
            shrinkResources  false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            debuggable       false
        }
    }

    splits {
        abi {
            reset()
            enable       true
            universalApk false
            include      "arm64-v8a"
        }
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
        pickFirst '**/libonnxruntime.so'
        exclude   '**/libjsc.so'
    }

    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }

    lint {
        abortOnError      false
        checkReleaseBuilds false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    def hermesEnabled = project.properties['hermesEnabled'] ?: 'true'
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
