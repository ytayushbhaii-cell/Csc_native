// Top-level build file — configuration shared by all sub-projects/modules.

buildscript {
    ext {
        // ── SDK / Tools ──────────────────────────────────────────────────────
        // SDK 35 (Android 15) is pre-installed on all Codemagic machines.
        // SDK 36 (Android 16) is too new for most CI runners → downgraded.
        buildToolsVersion  = "35.0.0"
        minSdkVersion      = 24
        compileSdkVersion  = 35
        targetSdkVersion   = 35
        ndkVersion         = "27.1.12297006"

        // ── Kotlin / AGP ─────────────────────────────────────────────────────
        // React Native 0.81's Gradle plugin is built against this AGP/Kotlin pair.
        kotlinVersion = "2.1.20"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20")
    }
}

plugins {
    id("com.facebook.react.rootproject")
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
