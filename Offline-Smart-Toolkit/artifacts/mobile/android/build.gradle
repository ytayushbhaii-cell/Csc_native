// Top-level build file — configuration shared by all sub-projects/modules.

buildscript {
    ext {
        // ── SDK / Tools ──────────────────────────────────────────────────────
        // SDK 35 (Android 15) is pre-installed on all Codemagic machines.
        // SDK 36 (Android 16) is too new for most CI runners → downgraded.
        buildToolsVersion  = "35.0.0"
        minSdkVersion      = 24
        compileSdkVersion  = 35
        targetSdkVersion   = 35
        ndkVersion         = "27.1.12297006"

        // ── Kotlin / AGP ─────────────────────────────────────────────────────
        // AGP 8.7.3 + Gradle 8.10.2 is the proven-stable CI combo for RN 0.81.
        kotlinVersion = "2.0.21"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.7.3")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21")
    }
}

plugins {
    id("com.facebook.react.rootproject")
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
